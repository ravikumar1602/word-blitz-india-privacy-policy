<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Word Blitz India</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  /* Smooth scroll behavior */
  html {
    scroll-behavior: smooth;
    overflow-x: hidden;
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
    -ms-text-size-adjust: 100%;
  }
  
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0A0F2C 0%, #1A1F3A 50%, #0F1529 100%);
    color: #e0e0e0;
    line-height: 1.8;
    font-size: 16px;
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  /* Scroll reveal animations */
  .fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }
  
  .slide-in-left {
    opacity: 0;
    transform: translateX(-50px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .slide-in-left.visible {
    opacity: 1;
    transform: translateX(0);
  }
  
  .slide-in-right {
    opacity: 0;
    transform: translateX(50px);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .slide-in-right.visible {
    opacity: 1;
    transform: translateX(0);
  }
  
  .scale-in {
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .scale-in.visible {
    opacity: 1;
    transform: scale(1);
  }
  
  :root {
    --neon-orange: #FF6B00;
    --neon-yellow: #FFD700;
    --neon-pink: #FF1493;
    --neon-cyan: #00FFFF;
    --neon-purple: #9D00FF;
    --dark-bg: #0A0F2C;
    --glass-bg: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
  }
  
  
  /* Multiple animated background layers */
  body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
      radial-gradient(circle at 20% 50%, rgba(255, 107, 0, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.1) 0%, transparent 50%),
      radial-gradient(circle at 40% 80%, rgba(157, 0, 255, 0.1) 0%, transparent 50%);
    animation: floatingParticles 20s ease-in-out infinite;
    z-index: -1;
  }
  
  body::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
      radial-gradient(circle at 60% 30%, rgba(255, 20, 147, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 30% 70%, rgba(0, 255, 255, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 60%, rgba(255, 107, 0, 0.06) 0%, transparent 35%);
    animation: floatingParticlesReverse 25s ease-in-out infinite;
    z-index: -2;
  }
  
  /* Additional floating orbs */
  .floating-orbs {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
    z-index: -3;
  }
  
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.4;
  }
  
  .orb1 {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255, 107, 0, 0.3), transparent);
    top: 10%;
    left: 10%;
    animation: orbFloat1 15s ease-in-out infinite;
  }
  
  .orb2 {
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent);
    top: 60%;
    right: 15%;
    animation: orbFloat2 18s ease-in-out infinite;
  }
  
  .orb3 {
    width: 180px;
    height: 180px;
    background: radial-gradient(circle, rgba(157, 0, 255, 0.3), transparent);
    bottom: 20%;
    left: 20%;
    animation: orbFloat3 20s ease-in-out infinite;
  }
  
  .orb4 {
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(255, 20, 147, 0.3), transparent);
    top: 30%;
    right: 30%;
    animation: orbFloat4 22s ease-in-out infinite;
  }
  
  @keyframes floatingParticles {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    33% { transform: translate(30px, -30px) rotate(120deg); }
    66% { transform: translate(-20px, 20px) rotate(240deg); }
  }
  
  @keyframes floatingParticlesReverse {
    0%, 100% { transform: translate(0, 0) rotate(360deg) scale(1); }
    25% { transform: translate(-25px, 25px) rotate(270deg) scale(1.1); }
    50% { transform: translate(20px, -20px) rotate(180deg) scale(0.9); }
    75% { transform: translate(-15px, -15px) rotate(90deg) scale(1.05); }
  }
  
  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
    25% { transform: translate(40px, -30px) scale(1.2); opacity: 0.6; }
    50% { transform: translate(-30px, 40px) scale(0.8); opacity: 0.3; }
    75% { transform: translate(20px, 20px) scale(1.1); opacity: 0.5; }
  }
  
  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
    33% { transform: translate(-35px, 25px) scale(0.9); opacity: 0.3; }
    66% { transform: translate(25px, -35px) scale(1.3); opacity: 0.6; }
  }
  
  @keyframes orbFloat3 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
    20% { transform: translate(30px, 30px) scale(1.15); opacity: 0.5; }
    40% { transform: translate(-25px, -20px) scale(0.85); opacity: 0.3; }
    60% { transform: translate(35px, -25px) scale(1.25); opacity: 0.6; }
    80% { transform: translate(-20px, 35px) scale(0.95); opacity: 0.4; }
  }
  
  @keyframes orbFloat4 {
    0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
    30% { transform: translate(-40px, -30px) scale(1.2); opacity: 0.5; }
    60% { transform: translate(30px, 40px) scale(0.8); opacity: 0.3; }
    90% { transform: translate(-25px, 35px) scale(1.1); opacity: 0.6; }
  }
  
  .logo { 
    margin-bottom: 16px;
    text-align: center;
    animation: neonGlow 2s ease-in-out infinite alternate;
  }
  
  .logo-img {
    width: 120px;
    height: 120px;
    border-radius: 24px;
    object-fit: cover;
    box-shadow: 0 0 30px rgba(255, 107, 0, 0.8),
                0 0 60px rgba(255, 107, 0, 0.4),
                0 0 90px rgba(255, 107, 0, 0.2);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .logo-img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255, 215, 0, 0.9),
                0 0 80px rgba(255, 215, 0, 0.5),
                0 0 120px rgba(255, 215, 0, 0.3);
  }
  
  @keyframes neonGlow {
    from { 
      text-shadow: 0 0 30px rgba(255, 107, 0, 0.8),
                   0 0 60px rgba(255, 107, 0, 0.4),
                   0 0 90px rgba(255, 107, 0, 0.2);
    }
    to { 
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.9),
                   0 0 80px rgba(255, 215, 0, 0.5),
                   0 0 120px rgba(255, 215, 0, 0.3);
    }
  }
  
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-yellow), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
    position: relative;
    animation: gradientShift 3s ease-in-out infinite;
    text-align: center;
  }
  
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  
  .tagline {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 40px;
    font-weight: 300;
    letter-spacing: 1px;
    text-align: center;
  }
  
  .links {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    max-width: 320px;
    position: relative;
    text-align: center;
  }
  
  .btn {
    display: block;
    padding: 16px 28px;
    border-radius: 16px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(10px);
    border: 2px solid transparent;
    text-transform: uppercase;
    letter-spacing: 1px;
    text-align: center;
  }
  
  .btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
    transition: left 0.5s;
  }
  
  .btn:hover::before {
    left: 100%;
  }
  
  .btn-primary {
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-yellow));
    color: white;
    box-shadow: 0 0 20px rgba(255, 107, 0, 0.5),
                0 0 40px rgba(255, 107, 0, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
    border: 2px solid var(--neon-orange);
  }
  
  .btn-primary:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 0 30px rgba(255, 107, 0, 0.7),
                0 0 60px rgba(255, 107, 0, 0.4),
                0 10px 30px rgba(0, 0, 0, 0.3),
                inset 0 0 30px rgba(255, 255, 255, 0.2);
    border-color: var(--neon-yellow);
  }
  
  .btn-secondary {
    background: var(--glass-bg);
    color: rgba(255,255,255,0.8);
    border: 2px solid var(--glass-border);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
  }
  
  .btn-secondary:hover {
    transform: translateY(-2px) scale(1.02);
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 107, 0, 0.5);
    box-shadow: 0 0 20px rgba(255, 107, 0, 0.3),
                0 12px 40px rgba(0, 0, 0, 0.4),
                inset 0 0 30px rgba(255, 255, 255, 0.1);
    color: white;
  }
  
  .flag {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    position: relative;
  }
  
  .flag span { 
    width: 30px; 
    height: 8px; 
    display: block;
    position: relative;
    transition: all 0.3s;
  }
  
  .flag:hover span {
    transform: scaleY(1.2);
    filter: brightness(1.3);
  }
  
  .language-switcher {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 4px;
    background: var(--glass-bg);
    padding: 6px;
    border-radius: 12px;
    backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }
  
  .lang-btn {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    text-align: center;
  }
  
  .lang-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    transition: left 0.3s;
  }
  
  .lang-btn:hover::before {
    left: 100%;
  }
  
  .lang-btn.active {
    background: linear-gradient(135deg, var(--neon-orange), var(--neon-yellow));
    color: white;
    box-shadow: 0 0 15px rgba(255, 107, 0, 0.5),
                inset 0 0 10px rgba(255, 255, 255, 0.2);
    transform: scale(1.05);
  }
  
  .lang-btn:hover:not(.active) {
    background: rgba(255,255,255,0.1);
    color: white;
    transform: scale(1.02);
  }
  
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    font-weight: 300;
    letter-spacing: 0.5px;
    text-align: center;
  }
  
  /* Additional gaming effects */
  .glow-border {
    position: relative;
  }
  
  .glow-border::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(45deg, var(--neon-orange), var(--neon-yellow), var(--neon-pink), var(--neon-cyan), var(--neon-orange));
    border-radius: inherit;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s;
    animation: borderRotate 3s linear infinite;
  }
  
  .glow-border:hover::before {
    opacity: 1;
  }
  
  @keyframes borderRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  
  /* Enhanced responsive design */
  @media (max-width: 768px) {
    body {
      padding: 15px;
    }
    
    .logo { 
      margin-bottom: 12px;
    }
    
    .logo-img {
      width: 100px;
      height: 100px;
      border-radius: 20px;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    
    .tagline {
      font-size: 14px;
      margin-bottom: 30px;
      letter-spacing: 0.5px;
    }
    
    .links {
      max-width: 280px;
      gap: 14px;
    }
    
    .btn {
      padding: 15px 24px;
      font-size: 14px;
      border-radius: 14px;
    }
    
    .flag span {
      width: 26px;
      height: 7px;
    }
    
    .language-switcher {
      top: 15px;
      right: 15px;
      padding: 4px;
      border-radius: 10px;
    }
    
    .lang-btn {
      padding: 8px 14px;
      font-size: 12px;
      border-radius: 6px;
    }
    
    /* Reduce floating orbs size on mobile */
    .orb1 { width: 120px; height: 120px; }
    .orb2 { width: 90px; height: 90px; }
    .orb3 { width: 100px; height: 100px; }
    .orb4 { width: 80px; height: 80px; }
  }
  
  @media (max-width: 480px) {
    body {
      padding: 12px;
    }
    
    .logo { 
      margin-bottom: 10px;
    }
    
    .logo-img {
      width: 85px;
      height: 85px;
      border-radius: 18px;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
      line-height: 1.2;
    }
    
    .tagline {
      font-size: 13px;
      margin-bottom: 25px;
      letter-spacing: 0.3px;
      line-height: 1.4;
    }
    
    .links {
      max-width: 260px;
      gap: 12px;
      width: 100%;
    }
    
    .btn {
      padding: 14px 20px;
      font-size: 13px;
      border-radius: 12px;
    }
    
    .flag span {
      width: 24px;
      height: 6px;
    }
    
    .language-switcher {
      top: 10px;
      right: 10px;
      padding: 3px;
      border-radius: 8px;
      gap: 2px;
    }
    
    .lang-btn {
      padding: 6px 12px;
      font-size: 11px;
      border-radius: 5px;
    }
    
    footer {
      font-size: 11px;
      margin-top: 30px;
    }
    
    /* Further reduce floating orbs on small mobile */
    .orb1 { width: 100px; height: 100px; }
    .orb2 { width: 75px; height: 75px; }
    .orb3 { width: 85px; height: 85px; }
    .orb4 { width: 65px; height: 65px; }
  }
  
  @media (max-width: 360px) {
    h1 { font-size: 24px; }
    .logo { margin-bottom: 8px; }
    .logo-img { 
      width: 75px; 
      height: 75px; 
      border-radius: 16px; 
    }
    .btn { padding: 12px 16px; font-size: 12px; }
    .tagline { font-size: 12px; }
    .links { max-width: 240px; }
  }
</style>
</head>

  <script>
    const translations = {
      en: {

        tagline: "India ka #1 Hindi-English Word Puzzle Game",
        download: "Download on Play Store",
        privacy: "Privacy Policy",

    let currentLanguage = localStorage.getItem('preferredLanguage') || 'en';

    function setLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('preferredLanguage', lang);
      
      // Update button states
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Matrix text scramble effect
      const matrixChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*अआइईउऊएऐओऔकखगघचछजझटठडढणतथदधनपफबभमयरलवशषसह';
      
      document.querySelectorAll('[data-translate]').forEach(element => {
        const key = element.getAttribute('data-translate');
        if (translations[lang][key]) {
          const finalText = translations[lang][key];
          const isHtml = finalText.includes('<svg');
          
          // For buttons with SVG icons, only animate the span text
          const spanElement = element.querySelector('span');
          if (spanElement && !isHtml) {
            matrixTextEffect(spanElement, finalText, matrixChars);
          } else if (!isHtml) {
            matrixTextEffect(element, finalText, matrixChars);
          } else {
            // For HTML content (like footer), directly update
            element.innerHTML = finalText;
          }
        }
      });
      
      // Update HTML lang attribute
      document.documentElement.lang = lang;
    }
    
    // Matrix text scramble animation - Enhanced Stable Version
    function matrixTextEffect(element, finalText, chars) {
      // Prevent multiple animations on same element
      if (element.dataset.animating === 'true') return;
      element.dataset.animating = 'true';
      
      const originalText = element.textContent || '';
      const maxLength = Math.max(originalText.length, finalText.length);
      let iteration = 0;
      let frame = 0;
      const totalFrames = 25; // Total animation duration
      
      // Add glow effect during animation
      element.style.textShadow = '0 0 10px rgba(0, 255, 157, 0.5), 0 0 20px rgba(0, 255, 157, 0.3)';
      element.style.transition = 'text-shadow 0.3s ease';
      
      const animate = () => {
        frame++;
        const progress = frame / totalFrames;
        iteration = Math.floor(progress * finalText.length);
        
        let output = '';
        for (let i = 0; i < finalText.length; i++) {
          if (finalText[i] === ' ') {
            output += ' ';
          } else if (i < iteration) {
            output += finalText[i];
          } else {
            // Random character with weighted probability
            const randomChar = chars[Math.floor(Math.random() * chars.length)];
            output += randomChar;
          }
        }
        
        element.textContent = output;
        
        if (frame < totalFrames) {
          requestAnimationFrame(animate);
        } else {
          // Animation complete
          element.textContent = finalText;
          element.style.textShadow = '';
          element.dataset.animating = 'false';
        }
      };
      
      requestAnimationFrame(animate);
    }

    // Initialize language on page load
    document.addEventListener('DOMContentLoaded', function() {
      const langButtons = document.querySelectorAll('.lang-btn');
      langButtons.forEach(btn => {
        if (btn.textContent.includes(currentLanguage === 'en' ? 'English' : 'हिंग्लिश')) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
      
      // Apply saved language
      document.querySelectorAll('[data-translate]').forEach(element => {
        const key = element.getAttribute('data-translate');
        if (translations[currentLanguage][key]) {
          const translation = translations[currentLanguage][key];
          // For buttons with SVG icons, only update the span text
          const spanElement = element.querySelector('span');
          if (spanElement) {
            spanElement.textContent = translation;
          } else if (translation.includes('<svg')) {
            // Use innerHTML for translations with SVG/HTML
            element.innerHTML = translation;
          } else {
            element.textContent = translation;
          }
        }
      });
      
      document.documentElement.lang = currentLanguage;
      
      // Initialize scroll animations
      initScrollAnimations();
    });
    
    // Scroll animation functionality
    function initScrollAnimations() {
      const observerOptions = {
        threshold: 0.05,
        rootMargin: '0px 0px -10px 0px'
      };
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, observerOptions);
      
      // Observe all animated elements
      document.querySelectorAll('.fade-in, .slide-in-left, .slide-in-right, .scale-in').forEach(el => {
        observer.observe(el);
      });
    }
  </script>
