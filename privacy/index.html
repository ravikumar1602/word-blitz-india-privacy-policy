<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Blitz India</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0A0F2C;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .logo { font-size: 72px; margin-bottom: 16px; }
  h1 {
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, #FF6B00, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 40px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }
  .btn {
    display: block;
    padding: 14px 24px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary {
    background: linear-gradient(135deg, #FF6B00, #FFD700);
    color: white;
  }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.12);
  }
  .flag {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    border-radius: 3px;
    overflow: hidden;
  }
  .flag span { width: 30px; height: 6px; display: block; }
  footer {
    margin-top: 40px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
  <div class="logo">🔤</div>
  <h1>Word Blitz India</h1>
  <p class="tagline">India ka #1 Hindi-English Word Puzzle Game 🇮🇳</p>

  <div class="links">
    <a href="https://play.google.com/store/apps/details?id=com.wordblitz.india"
       class="btn btn-primary">
      📱 Download on Play Store
    </a>
    <a href="privacy_policy.html" class="btn btn-secondary">
      🔒 Privacy Policy
    </a>
    <a href="mailto:support@wordblitzindia.com" class="btn btn-secondary">
      📧 Contact Support
    </a>
  </div>

  <div class="flag">
    <span style="background:#FF6B00"></span>
    <span style="background:white"></span>
    <span style="background:#00A651"></span>
  </div>

  <footer>© 2026 Word Blitz India · Made with ❤️ in India</footer>
</body>
</html>
